apis:
  - aid: vishay-intertechnology:vishay-parts-data-via-octopart
    name: Vishay Parts Data via Octopart/Nexar API
    description: >-
      Access Vishay component data programmatically through the Octopart/Nexar API.
      Search for Vishay parts by part number or category, retrieve datasheets,
      specifications, pricing, and distributor inventory.
    humanURL: https://nexar.com/api
    tags:
      - Components
      - Search
      - Electronic Parts
      - Data
    properties:
      - type: Documentation
        url: https://nexar.com/api
      - type: ExternalAPI
        url: https://octopart.com/manufacturers/vishay
  - aid: vishay-intertechnology:vishay-parts-data-via-digikey
    name: Vishay Parts Data via DigiKey API
    description: >-
      Access Vishay component inventory, pricing, specifications, and datasheets
      through the DigiKey REST API. Enables integration of Vishay component data
      into BOM management and design tools.
    humanURL: https://developer.digikey.com/
    tags:
      - Components
      - Inventory
      - Electronic Parts
      - Data
    properties:
      - type: Documentation
        url: https://developer.digikey.com/
  - aid: vishay-intertechnology:vishay-parts-library
    name: Vishay Parts Library (VPL)
    description: >-
      The Vishay Parts Library (VPL) is a cross-reference resource that provides
      Vishay alternatives for industry reference designs, searchable by IC part
      number and manufacturer.
    humanURL: https://www.vishay.com/
    tags:
      - Parts Library
      - Cross-Reference
      - Electronic Parts
    properties:
      - type: Documentation
        url: https://www.vishay.com/

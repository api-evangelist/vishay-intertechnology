aid: vishay-intertechnology
name: Vishay Intertechnology
description: >-
  Vishay Intertechnology is one of the world's largest manufacturers of discrete
  semiconductors (diodes, rectifiers, MOSFETs, optoelectronics, selected ICs) and
  passive electronic components (resistors, inductors, capacitors). Vishay components
  are used in automotive, industrial, computing, consumer, telecommunications, military,
  aerospace, and medical applications. Component data is accessible via distributor
  APIs (Octopart/Nexar, DigiKey) and Vishay's own Parts Library (VPL) tool.
type: Index
url: https://raw.githubusercontent.com/api-evangelist/vishay-intertechnology/refs/heads/main/apis.yml
